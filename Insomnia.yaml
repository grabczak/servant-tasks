            disabled: false
        scripts:
          afterResponse: |
            const statusCode = insomnia.response.code;

            if (statusCode === 200) {
            	const jsonBody = insomnia.response.json();

            	insomnia.environment.set("token", jsonBody);
            } else {
            	insomnia.environment.set("token", "");
            }
