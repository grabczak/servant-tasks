    scripts:
      preRequest: |
        const token = insomnia.environment.get("token");

        if (token) {
        	insomnia.request.auth.update(
        		{
        			type: 'bearer',
        			bearer: [
        				{key: 'token', value: token},
        			],
        		},
        		'bearer'
        	);
        }
